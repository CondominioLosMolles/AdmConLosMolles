<!-- CONTABILIDAD -->
<section id="contabilidad" class="view hidden">
  <h2>Contabilidad</h2>

  <div class="tabs">
    <button onclick="mostrarTabContabilidad('ingresos')">Ingresos</button>
    <button onclick="mostrarTabContabilidad('egresos')">Egresos</button>
  </div>

  <div id="ingresos" class="contab-tab hidden">
    <h3>Resumen de Ingresos</h3>
    <table id="tablaIngresos">
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Fecha</th>
          <th>Residente</th>
          <th>Parcela</th>
          <th>Monto</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="egresos" class="contab-tab hidden">
    <h3>Listado de Egresos</h3>
    <button onclick="document.getElementById('formEgreso').classList.toggle('hidden')">Agregar Gasto</button>
    
    <form id="formEgreso" class="hidden">
      <label>Fecha: <input type="date" id="fechaEgreso" required></label>
      <label>Categoría:
        <select id="categoriaEgreso">
          <option>Remuneraciones</option>
          <option>Servicios Básicos</option>
          <option>Mantención</option>
          <option>Administrativo</option>
          <option>Otros</option>
        </select>
      </label>
      <label>Descripción: <input type="text" id="descripcionEgreso" required></label>
      <label>Proveedor: <input type="text" id="proveedorEgreso"></label>
      <label>Monto: <input type="number" id="montoEgreso" required></label>
      <label>Factura:
        <input type="file" id="archivoEgreso" accept="application/pdf,image/*">
      </label>
      <button type="submit">Guardar</button>
    </form>

    <table id="tablaEgresos">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Categoría</th>
          <th>Descripción</th>
          <th>Proveedor</th>
          <th>Monto</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>
