<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Condominio Los Molles - Administración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tipografía moderna -->
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600&display=swap" rel="stylesheet">
  <!-- Chart.js para el Dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Google API Client -->
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      background: #e3f0fa;
      color: #222;
    }
    #login-section {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; background: #e3f0fa;
    }
    #login-card {
      background: #fff; border-radius: 16px; box-shadow: 0 2px 16px #0001;
      padding: 36px 48px; min-width: 320px; text-align: center;
    }
    #login-card h2 { color: #2176ae; margin-bottom: 18px; }
    #login-card p { color: #444; margin-bottom: 28px; }
    .loading { color: #2176ae; margin-top: 20px; }
    .error-message { color: #e74c3c; margin-top: 10px; }
    #app-section {
      display: none;
    }
    /* Aquí irían los demás estilos de tu aplicación */
  </style>
</head>
<body>
  <!-- SECCIÓN DE LOGIN -->
  <div id="login-section">
    <div id="login-card">
      <h2>Condominio Los Molles</h2>
      <p>Inicia sesión con tu cuenta de Google para administrar el sistema.</p>
      <div id="g_id_signin"></div>
      <div id="g_id_onload" 
         data-client_id="997872453031-5o8s2o6v3qt722fb3p51a2r7bo24ncee.apps.googleusercontent.com"
         data-context="signin"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
      </div>
      <div class="loading" id="login-loading" style="display:none;">Conectando con Google...</div>
      <div class="error-message" id="login-error" style="display:none;"></div>
    </div>
  </div>

  <!-- SECCIÓN PRINCIPAL DE LA APLICACIÓN (oculta hasta autenticación) -->
  <div id="app-section">
    <!-- Aquí irá el contenido de tu aplicación -->
    <div id="user-info" style="padding: 20px; text-align: center;"></div>
  </div>

  <script>
    // Configuración de credenciales y API
    const CLIENT_ID = '997872453031-5o8s2o6v3qt722fb3p51a2r7bo24ncee.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyA4nUkMycf_CHZE7TaBBD_WUyWMvSXUwoU';
    const SPREADSHEET_ID = '1bFo5dBC3HM0xupginTBe-hrrUNgkiuUn4fkXXzHide8';
    const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/gmail.send';
    
    let tokenClient;
    let accessToken = null;
    
    // Función para inicializar la API de Google
    function initializeGapiClient() {
      gapi.load('client', async () => {
        try {
          await gapi.client.init({
            apiKey: API_KEY,
            discoveryDocs: [
              "https://sheets.googleapis.com/$discovery/rest?version=v4",
              "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest",
              "https://gmail.googleapis.com/$discovery/rest?version=v1"
            ]
          });
          console.log("GAPI client loaded");
          
          // Inicializar el cliente de token OAuth2
          tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
              if (tokenResponse && tokenResponse.access_token) {
                accessToken = tokenResponse.access_token;
                // Configurar el token en gapi.client
                gapi.client.setToken({access_token: accessToken});
                console.log("Token de acceso obtenido y configurado");
                
                // Aquí puedes cargar el contenido inicial de tu aplicación
                document.getElementById('app-section').style.display = 'block';
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('login-loading').style.display = 'none';
                
                // Ejemplo: mostrar información del usuario
                document.getElementById('user-info').innerHTML = `
                  <h3>Sesión iniciada correctamente</h3>
                  <p>Usuario: ${currentUserEmail}</p>
                  <p>Token de acceso obtenido. Las APIs de Google están listas para usar.</p>
                  <button onclick="cargarDashboard()">Ir al Dashboard</button>
                `;
              }
            }
          });
        } catch (error) {
          console.error("Error al inicializar GAPI client:", error);
          document.getElementById('login-error').textContent = 'Error al inicializar la API de Google: ' + error.message;
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
        }
      });
    }
    
    // Variable para almacenar el email del usuario
    let currentUserEmail = "";
    
    // Función que maneja la respuesta de autenticación de Google Identity Services
    function handleCredentialResponse(response) {
      document.getElementById('login-loading').style.display = 'block';
      document.getElementById('login-error').style.display = 'none';
      
      try {
        // Decodificar el token JWT para obtener la información del usuario
        const payload = parseJwt(response.credential);
        currentUserEmail = payload.email;
        
        // Verificar que sea el usuario administrador autorizado
        if (currentUserEmail !== "losmollestunquen@gmail.com") {
          document.getElementById('login-error').textContent = 'Solo el administrador autorizado puede ingresar.';
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
          return;
        }
        
        console.log("Usuario autenticado:", currentUserEmail);
        
        // Solicitar token OAuth para acceder a las APIs de Google
        if (tokenClient) {
          tokenClient.requestAccessToken();
        } else {
          document.getElementById('login-error').textContent = 'Error: Cliente de token no inicializado.';
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
        }
      } catch (error) {
        console.error("Error al procesar credenciales:", error);
        document.getElementById('login-error').textContent = 'Error al procesar credenciales: ' + error.message;
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('login-loading').style.display = 'none';
      }
    }
    
    // Función para decodificar el token JWT
    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }
    
    // Función para cargar el dashboard (ejemplo)
    function cargarDashboard() {
      // Aquí irían las llamadas a la API de Google Sheets para cargar datos
      console.log("Cargando dashboard...");
      // Ejemplo: leer datos de la hoja de cálculo
      gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: SPREADSHEET_ID,
        range: 'Residentes!A:H'
      }).then(response => {
        const values = response.result.values || [];
        console.log("Datos de residentes cargados:", values.length);
        // Aquí procesarías y mostrarías los datos
      }).catch(error => {
        console.error("Error al cargar datos:", error);
      });
    }
    
    // Inicializar todo cuando la página cargue
    window.onload = function() {
      // Inicializar la API de Google
      initializeGapiClient();
      
      // Inicializar el botón de inicio de sesión de Google
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
      });
      
      // Renderizar el botón de inicio de sesión
      google.accounts.id.renderButton(
        document.getElementById('g_id_signin'),
        { 
          theme: 'outline', 
          size: 'large',
          type: 'standard',
          text: 'signin_with',
          shape: 'rectangular',
          logo_alignment: 'left'
        }
      );
    };
  </script>
</body>
</html>
