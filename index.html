<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Condominio Los Molles</title>
  <style>
    :root {
      --primary: #2196F3;
      --accent: #4CAF50;
      --bg: #f5f5f5;
      --text: #333;
      --font: 'Roboto', sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    .btn-login {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Condominio Los Molles</h1>
    <button id="login-btn" class="btn-login">Iniciar Sesión</button>
    <div id="user-info" class="hidden"></div>
    <div id="app" class="hidden">
      <p>¡Bienvenido! Aquí se mostrarán los módulos del sistema.</p>
    </div>
  </div>

  <!-- Google APIs -->
  <script src="https://apis.google.com/js/api.js"></script> 
  <script src="https://accounts.google.com/gsi/client"  async defer></script>

  <script>
    // Configuración
    const CONFIG = {
      CLIENT_ID: "997872453031-5o8s2o6v3qt722fb3p51a2r7bo24ncee.apps.googleusercontent.com",
      SCOPES: [
        "https://www.googleapis.com/auth/spreadsheets", 
        "https://www.googleapis.com/auth/drive.file", 
        "https://www.googleapis.com/auth/gmail.send" 
      ],
      ALLOWED_EMAIL: "losmollestunquen@gmail.com"
    };

    let tokenClient;
    let gapiInited = false;
    let gisInited = false;

    // Inicializar Google Auth
    function initAuth() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES.join(" "),
        callback: () => {} // Empty callback
      });
    }

    // Manejar login
    function handleLogin() {
      if (!gapiInited || !gisInited) {
        alert("API no inicializada. Espere...");
        return;
      }
      tokenClient.requestAccessToken();
      const user = google.accounts.oauth2.initBasicProfile();
      if (user.getEmail() !== CONFIG.ALLOWED_EMAIL) {
        alert("Acceso denegado. Use la cuenta autorizada.");
        return;
      }
      document.getElementById("login-btn").style.display = "none";
      document.getElementById("user-info").textContent = `Bienvenido, ${user.getName()}`;
      document.getElementById("user-info").classList.remove("hidden");
      document.getElementById("app").classList.remove("hidden");
    }

    // Inicializar APIs
    window.addEventListener("load", () => {
      // Cargar GAPI
      gapi.load("client", async () => {
        await gapi.client.init({
          apiKey: "AIzaSyA4nUkMycf_CHZE7TaBBD_WUyWMvSXUwoU",
          clientId: CONFIG.CLIENT_ID,
          scope: CONFIG.SCOPES.join(" ")
        });
        gapiInited = true;
      });

      // Cargar GIS
      const script = document.createElement("script");
      script.src = "https://accounts.google.com/gsi/client"; 
      script.onload = () => {
        initAuth();
        gisInited = true;
      };
      script.onerror = () => {
        alert("Error cargando Google Identity Services.");
      };
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
