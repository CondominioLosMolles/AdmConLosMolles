<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Condominio Los Molles - Administración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* --- Aquí va todo tu CSS global y específico --- */
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Poppins', Arial, sans-serif;
      background: #f3f4f6;
      color: #222;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-width: 320px;
    }
    #login-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f3f4f6;
      padding: 0 16px;
      box-sizing: border-box;
    }
    #login-card {
      background: rgba(255 255 255 / 0.85);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgb(33 118 174 / 0.15);
      padding: 40px 56px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(33, 118, 174, 0.2);
    }
    #login-card h2 {
      color: #2176ae;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 2rem;
    }
    #login-card p {
      color: #444;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }
    .loading {
      color: #2176ae;
      margin-top: 20px;
      font-weight: 600;
    }
    .error-message {
      color: #e74c3c;
      margin-top: 12px;
      font-weight: 600;
    }
    #app-section {
      display: none;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      box-sizing: border-box;
      display: flex;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 220px;
      background: rgba(255 255 255 / 0.8);
      border-right: 1px solid rgba(33, 118, 174, 0.2);
      padding: 40px 0 0 0;
      display: flex;
      flex-direction: column;
      z-index: 10;
      backdrop-filter: blur(10px);
      box-shadow: inset 1px 0 0 rgb(33 118 174 / 0.1);
      overflow-y: auto;
      height: 100vh;
    }
    .sidebar h2 {
      text-align: center;
      font-weight: 700;
      color: #2176ae;
      margin-bottom: 32px;
      font-size: 1.6rem;
      letter-spacing: 1.2px;
      user-select: none;
    }
    .sidebar nav {
      display: flex;
      flex-direction: column;
    }
    .nav-link {
      padding: 16px 36px;
      color: #2176ae;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      border-left: 4px solid transparent;
      transition: background 0.3s, border-color 0.3s;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .nav-link.active,
    .nav-link:hover {
      background: rgba(33, 118, 174, 0.1);
      border-left: 4px solid #2176ae;
      color: #14496b;
    }
    .main-content {
      margin-left: 220px;
      padding: 40px 56px;
      height: 100vh;
      overflow-y: auto;
      background: #f3f4f6;
      transition: margin 0.3s;
      box-sizing: border-box;
      max-width: calc(100vw - 220px);
    }
    @media (max-width: 900px) {
      .sidebar {
        width: 60px;
        padding: 16px 0 0 0;
      }
      .sidebar h2 {
        display: none;
      }
      .nav-link {
        padding: 12px 16px;
        font-size: 0.95rem;
      }
      .main-content {
        margin-left: 60px;
        padding: 24px 16px;
        max-width: calc(100vw - 60px);
      }
    }
    /* Agrega aquí más estilos específicos según tu código original */
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-section">
    <div id="login-card">
      <h2>Condominio Los Molles</h2>
      <p>Inicia sesión con tu cuenta de Google para administrar el sistema.</p>
      <div id="g_id_signin"></div>
      <div class="loading" id="login-loading" style="display:none;">Conectando con Google...</div>
      <div class="error-message" id="login-error" style="display:none;"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-section">
    <div class="sidebar">
      <h2>Los Molles</h2>
      <nav>
        <a href="#" data-module="dashboard" class="nav-link active">Dashboard</a>
        <a href="#" data-module="residentes" class="nav-link">Residentes</a>
        <a href="#" data-module="gastos-comunes" class="nav-link">Gastos Comunes</a>
      </nav>
    </div>
    <div class="main-content" id="main-content">
      <!-- Aquí se cargará el contenido dinámicamente -->
    </div>
  </div>

  <script>
    const CLIENT_ID = '997872453031-5o8s2o6v3qt722fb3p51a2r7bo24ncee.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyA4nUkMycf_CHZE7TaBBD_WUyWMvSXUwoU';
    const SPREADSHEET_ID = '1bFo5dBC3HM0xupginTBe-hrrUNgkiuUn4fkXXzHide8';
    const SCOPES =
      'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/gmail.send';

    let tokenClient;
    let accessToken = null;
    let currentUserEmail = '';

    const appSection = document.getElementById('app-section');
    const loginSection = document.getElementById('login-section');
    const mainContent = document.getElementById('main-content');
    const navLinks = document.querySelectorAll('.nav-link');

    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split('')
          .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
          .join('')
      );
      return JSON.parse(jsonPayload);
    }

    window.handleCredentialResponse = function(response) {
      document.getElementById('login-loading').style.display = 'block';
      document.getElementById('login-error').style.display = 'none';
      try {
        const payload = parseJwt(response.credential);
        currentUserEmail = payload.email;
        if (currentUserEmail !== 'losmollestunquen@gmail.com') {
          document.getElementById('login-error').textContent = 'Solo el administrador autorizado puede ingresar.';
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
          return;
        }
        if (tokenClient) {
          tokenClient.requestAccessToken();
        } else {
          document.getElementById('login-error').textContent = 'Error: Cliente de token no inicializado.';
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
        }
      } catch (error) {
        document.getElementById('login-error').textContent = 'Error al procesar credenciales: ' + error.message;
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('login-loading').style.display = 'none';
      }
    };

    async function initializeGapiClient() {
      return new Promise((resolve, reject) => {
        gapi.load('client', async () => {
          try {
            await gapi.client.init({
              apiKey: API_KEY,
              discoveryDocs: [
                'https://sheets.googleapis.com/$discovery/rest?version=v4',
                'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest',
                'https://gmail.googleapis.com/$discovery/rest?version=v1',
              ],
            });
            tokenClient = google.accounts.oauth2.initTokenClient({
              client_id: CLIENT_ID,
              scope: SCOPES,
              callback: (tokenResponse) => {
                if (tokenResponse && tokenResponse.access_token) {
                  accessToken = tokenResponse.access_token;
                  gapi.client.setToken({ access_token: accessToken });
                  loginSection.style.display = 'none';
                  appSection.style.display = 'flex';
                  setActiveNav('dashboard');
                  loadModule('dashboard');
                }
              },
            });
            resolve();
          } catch (error) {
            document.getElementById('login-error').textContent =
              'Error al inicializar la API de Google: ' + error.message;
            document.getElementById('login-error').style.display = 'block';
            document.getElementById('login-loading').style.display = 'none';
            reject(error);
          }
        });
      });
    }

    async function loadModule(moduleName) {
      try {
        const html = await fetch(`modulos/${moduleName}/${moduleName}.html`).then(res => res.text());
        mainContent.innerHTML = html;
        await import(`./modulos/${moduleName}/${moduleName}.js`);
        // Cargar CSS dinámicamente
        const existingLink = document.getElementById('module-css');
        if (existingLink) existingLink.remove();
        const link = document.createElement('link');
        link.id = 'module-css';
        link.rel = 'stylesheet';
        link.href = `modulos/${moduleName}/${moduleName}.css`;
        document.head.appendChild(link);
      } catch (error) {
        mainContent.innerHTML = `<p>Error al cargar el módulo ${moduleName}: ${error.message}</p>`;
      }
    }

    function setActiveNav(moduleName) {
      navLinks.forEach(link => {
        if (link.dataset.module === moduleName) link.classList.add('active');
        else link.classList.remove('active');
      });
    }

    navLinks.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const moduleName = link.dataset.module;
        setActiveNav(moduleName);
        loadModule(moduleName);
      });
    });

    window.onload = async () => {
      await initializeGapiClient();
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: window.handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true,
      });
      google.accounts.id.renderButton(document.getElementById('g_id_signin'), {
        theme: 'outline',
        size: 'large',
        type: 'standard',
        text: 'signin_with',
        shape: 'rectangular',
        logo_alignment: 'left',
      });
    };
  </script>
</body>
</html>
