<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Condominio Los Molles - Administración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* --- (Todo el CSS que ya teníamos, sin cambios) --- */
    /* Diseño moderno inspirado en Windows 11, sistema responsive a pantalla completa */
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Poppins', Arial, sans-serif;
      background: #f3f4f6;
      color: #222;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-width: 320px;
    }
    #login-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f3f4f6;
      padding: 0 16px;
      box-sizing: border-box;
    }
    #login-card {
      background: rgba(255 255 255 / 0.85);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgb(33 118 174 / 0.15);
      padding: 40px 56px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(33, 118, 174, 0.2);
    }
    #login-card h2 {
      color: #2176ae;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 2rem;
    }
    #login-card p {
      color: #444;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }
    .loading {
      color: #2176ae;
      margin-top: 20px;
      font-weight: 600;
    }
    .error-message {
      color: #e74c3c;
      margin-top: 12px;
      font-weight: 600;
    }
    #app-section {
      display: none;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      box-sizing: border-box;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 220px;
      background: rgba(255 255 255 / 0.8);
      border-right: 1px solid rgba(33, 118, 174, 0.2);
      padding: 40px 0 0 0;
      display: flex;
      flex-direction: column;
      z-index: 10;
      backdrop-filter: blur(10px);
      box-shadow: inset 1px 0 0 rgb(33 118 174 / 0.1);
      overflow-y: auto;
      height: 100vh;
    }
    .sidebar h2 {
      text-align: center;
      font-weight: 700;
      color: #2176ae;
      margin-bottom: 32px;
      font-size: 1.6rem;
      letter-spacing: 1.2px;
      user-select: none;
    }
    .nav-link {
      padding: 16px 36px;
      color: #2176ae;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      border-left: 4px solid transparent;
      transition: background 0.3s, border-color 0.3s;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .nav-link.active,
    .nav-link:hover {
      background: rgba(33, 118, 174, 0.1);
      border-left: 4px solid #2176ae;
      color: #14496b;
    }
    .main-content {
      margin-left: 220px;
      padding: 40px 56px;
      height: 100vh;
      overflow-y: auto;
      background: #f3f4f6;
      transition: margin 0.3s;
      box-sizing: border-box;
      max-width: 100vw;
    }
    @media (max-width: 900px) {
      .sidebar {
        width: 60px;
        padding: 16px 0 0 0;
      }
      .sidebar h2 {
        display: none;
      }
      .nav-link {
        padding: 12px 16px;
        font-size: 0.95rem;
      }
      .main-content {
        margin-left: 60px;
        padding: 24px 16px;
      }
    }
    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #2176ae;
      margin-bottom: 28px;
      user-select: none;
    }
    .dashboard-widgets {
      display: flex;
      flex-wrap: nowrap;
      gap: 24px;
      margin-bottom: 36px;
      max-width: 100%;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    .dashboard-widgets::-webkit-scrollbar {
      height: 8px;
    }
    .dashboard-widgets::-webkit-scrollbar-thumb {
      background: #2176ae88;
      border-radius: 4px;
    }
    .widget {
      background: rgba(255 255 255 / 0.85);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgb(33 118 174 / 0.12);
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(14px);
      border: 1.5px solid rgba(33, 118, 174, 0.15);
      position: relative;
      overflow: hidden;
      user-select: none;
      min-width: 220px;
      flex: 0 0 auto;
      white-space: nowrap;
      text-align: center;
    }
    .widget:before {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2176ae33 0%, #2d7f5e33 100%);
      border-radius: 50%;
      z-index: 0;
    }
    .widget-title {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 10px;
      font-weight: 600;
      z-index: 1;
      white-space: normal;
      line-height: 1.3;
    }
    .widget-value {
      font-size: 2.6rem;
      color: #2176ae;
      font-weight: 800;
      margin-bottom: 6px;
      z-index: 1;
      letter-spacing: 1.1px;
      white-space: nowrap;
    }
    /* Residentes tabla */
    .residente-actions {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 14px;
    }
    .residente-actions input {
      padding: 12px 18px;
      border: 1.5px solid #c4d7e7;
      border-radius: 12px;
      font-size: 1.1rem;
      outline: none;
      width: 280px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: inset 0 2px 4px rgb(33 118 174 / 0.1);
    }
    .residente-actions input:focus {
      border-color: #2176ae;
      box-shadow: 0 0 10px #2176aeaa;
    }
    .btn {
      background: linear-gradient(135deg, #2176ae, #2d7f5e);
      color: white;
      border-radius: 12px;
      padding: 12px 28px;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgb(33 118 174 / 0.4);
      transition: background 0.3s, box-shadow 0.3s;
      user-select: none;
      white-space: nowrap;
    }
    .btn:hover {
      background: linear-gradient(135deg, #2d7f5e, #2176ae);
      box-shadow: 0 6px 18px rgb(33 118 174 / 0.6);
    }
    .residente-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 12px;
      background: transparent;
      table-layout: fixed;
      word-wrap: break-word;
    }
    .residente-table thead tr th {
      background: transparent;
      color: #2176ae;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 12px 14px;
      text-align: left;
      user-select: none;
      white-space: nowrap;
    }
    .residente-table thead tr th:nth-child(1) { width: 22%; }
    .residente-table thead tr th:nth-child(2) { width: 13%; }
    .residente-table thead tr th:nth-child(3) { width: 9%; }
    .residente-table thead tr th:nth-child(4) { width: 18%; }
    .residente-table thead tr th:nth-child(5) { width: 15%; }
    .residente-table thead tr th:nth-child(6) { width: 12%; }
    .residente-table thead tr th:nth-child(7) { width: 12%; }
    .residente-table thead tr th:nth-child(8) { width: 11%; }
    .residente-table thead tr th:nth-child(9) { width: 10%; }
    .residente-table tbody tr {
      background: rgba(255 255 255 / 0.85);
      box-shadow: 0 4px 20px rgb(33 118 174 / 0.1);
      border-radius: 16px;
      transition: background 0.3s;
    }
    .residente-table tbody tr:hover {
      background: rgba(33, 118, 174, 0.1);
    }
    .residente-table tbody tr td {
      padding: 14px 16px;
      vertical-align: middle;
      font-size: 1rem;
      color: #444;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .acciones-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      margin-right: 12px;
      color: #2176ae;
      transition: color 0.3s;
      user-select: none;
    }
    .acciones-btn:hover {
      color: #e67e22;
    }
    .estado-chip {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1rem;
      user-select: none;
      min-width: 90px;
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
      white-space: nowrap;
    }
    .estado-activo {
      background-color: #e6f4ea;
      color: #2d7f5e;
      border: 1.5px solid #a6d8a8;
    }
    .estado-moroso {
      background-color: #fdecea;
      color: #c0392b;
      border: 1.5px solid #f5b7b1;
    }
    .estado-inactivo {
      background-color: #f2f3f4;
      color: #888;
      border: 1.5px solid #d5d8dc;
    }
    .modal-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #2228;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      min-width: 360px;
      max-width: 460px;
      box-shadow: 0 6px 24px #0003;
      position: relative;
    }
    .modal h3 {
      margin-top: 0;
      color: #2176ae;
      font-weight: 700;
      font-size: 1.8rem;
      user-select: none;
    }
    .modal label {
      display: block;
      margin-top: 18px;
      font-weight: 600;
      font-size: 1rem;
      user-select: none;
    }
    .modal input,
    .modal select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #c4d7e7;
      border-radius: 14px;
      font-size: 1rem;
      margin-top: 6px;
      outline-offset: 2px;
      transition: border-color 0.3s;
    }
    .modal input:focus,
    .modal select:focus {
      border-color: #2176ae;
      box-shadow: 0 0 10px #2176aeaa;
    }
    .modal .btn {
      width: 100%;
      margin-top: 28px;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 12px 0;
      border-radius: 14px;
    }
    .close-modal {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      font-size: 1.6rem;
      color: #888;
      cursor: pointer;
      transition: color 0.3s;
      user-select: none;
    }
    .close-modal:hover {
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-section">
    <div id="login-card">
      <h2>Condominio Los Molles</h2>
      <p>Inicia sesión con tu cuenta de Google para administrar el sistema.</p>
      <div id="g_id_signin"></div>
      <div class="loading" id="login-loading" style="display:none;">Conectando con Google...</div>
      <div class="error-message" id="login-error" style="display:none;"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-section">
    <div class="sidebar">
      <h2>Los Molles</h2>
      <a class="nav-link active" onclick="showSection('dashboard')">Dashboard</a>
      <a class="nav-link" onclick="showSection('residentes')">Residentes</a>
      <a class="nav-link" onclick="showGastosComunes()">Gastos Comunes</a>
    </div>
    <div class="main-content">
      <!-- DASHBOARD -->
      <div id="dashboard-section">
        <!-- (Dashboard content as before) -->
      </div>

      <!-- RESIDENTES -->
      <div id="residentes-section" style="display:none;">
        <!-- (Residentes content as before) -->
      </div>

      <!-- Gastos Comunes -->
      <div id="gastos-comunes-section" style="display:none;">
        <div class="section-title">Gastos Comunes</div>

        <div class="residente-actions" style="margin-bottom: 24px;">
          <input
            type="text"
            id="busqueda-gastos"
            placeholder="Buscar por nombre, RUT o parcela..."
            oninput="filtrarGastosComunes()"
            aria-label="Buscar gastos comunes"
            style="width: 320px;"
          />
          <button class="btn" onclick="abrirModalGasto()">Agregar Gasto Común</button>
        </div>

        <table class="residente-table" id="tabla-gastos" aria-label="Tabla de gastos comunes">
          <thead>
            <tr>
              <th style="width: 20%;">Nombre Residente</th>
              <th style="width: 14%;">RUT</th>
              <th style="width: 10%;">N° Parcela</th>
              <th style="width: 15%;">Fecha Pago</th>
              <th style="width: 15%;">Monto</th>
              <th style="width: 10%;">Interés (%)</th>
              <th style="width: 10%;">Multa (%)</th>
              <th style="width: 10%;">Total a Pagar</th>
              <th style="width: 10%;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody-gastos"></tbody>
        </table>

        <!-- Modal Agregar/Editar Gasto Común -->
        <div id="modal-gasto-bg" class="modal-bg" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-gasto-titulo">
          <div class="modal">
            <button class="close-modal" onclick="cerrarModalGasto()" aria-label="Cerrar">&times;</button>
            <h3 id="modal-gasto-titulo">Agregar Gasto Común</h3>
            <form id="form-gasto" onsubmit="guardarGasto(event)">
              <input type="hidden" id="gasto-id" />
              <label for="gasto-residente">Nombre Residente</label>
              <input type="text" id="gasto-residente" required autocomplete="off" />
              <label for="gasto-rut">RUT</label>
              <input type="text" id="gasto-rut" required />
              <label for="gasto-parcela">N° Parcela</label>
              <input type="number" id="gasto-parcela" required />
              <label for="gasto-fecha">Fecha Pago</label>
              <input type="date" id="gasto-fecha" required />
              <label for="gasto-monto">Monto</label>
              <input type="number" id="gasto-monto" min="0" required />
              <label for="gasto-interes">Interés (%)</label>
              <input type="number" id="gasto-interes" min="0" step="0.01" value="0" required />
              <label for="gasto-multa">Multa (%)</label>
              <input type="number" id="gasto-multa" min="0" step="0.01" value="0" required />
              <label for="gasto-total">Total a Pagar</label>
              <input type="number" id="gasto-total" readonly />
              <button class="btn" type="submit">Guardar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- (Funciones previas: initializeGapiClient, handleCredentialResponse, parseJwt, showSection, showGastosComunes, cargarDashboard, cargarResidentes, etc.) ---
    // Solo agregamos las funciones para Gastos Comunes y la integración con navegación

    // Variables para almacenar gastos comunes
    let gastosComunesData = [];

    // Filtrar gastos comunes
    function filtrarGastosComunes() {
      const filtro = document.getElementById('busqueda-gastos').value.trim().toLowerCase();
      const tbody = document.getElementById('tbody-gastos');
      tbody.innerHTML = '';
      gastosComunesData
        .filter(gasto => 
          gasto.nombre.toLowerCase().includes(filtro) ||
          gasto.rut.toLowerCase().includes(filtro) ||
          String(gasto.parcela).includes(filtro)
        )
        .forEach(gasto => {
          tbody.innerHTML += `
            <tr>
              <td>${gasto.nombre}</td>
              <td>${gasto.rut}</td>
              <td>${gasto.parcela}</td>
              <td>${gasto.fecha}</td>
              <td>$${Number(gasto.monto).toLocaleString('es-CL')}</td>
              <td>${gasto.interes}%</td>
              <td>${gasto.multa}%</td>
              <td>$${Number(gasto.total).toLocaleString('es-CL')}</td>
              <td>
                <button class="acciones-btn" title="Editar" onclick="abrirModalGasto('${gasto.id}')">&#9998;</button>
                <button class="acciones-btn" title="Eliminar" onclick="eliminarGasto('${gasto.id}')">&#128465;</button>
              </td>
            </tr>
          `;
        });
    }

    // Cargar gastos comunes desde Google Sheets
    async function cargarGastosComunes() {
      try {
        const res = await gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: SPREADSHEET_ID,
          range: 'Pagos_GC!A2:Q',
        });
        const rows = res.result.values || [];
        gastosComunesData = rows.map(row => ({
          id: row[0],
          nombre: row[1],
          rut: row[2],
          parcela: row[3],
          fecha: row[4],
          monto: Number(row[6]) || 0,
          interes: Number(row[7]) || 0,
          multa: Number(row[8]) || 0,
          total: Number(row[9]) || 0
        }));
        filtrarGastosComunes();
      } catch (error) {
        console.error('Error al cargar gastos comunes:', error);
      }
    }

    // Abrir modal gastos comunes
    function abrirModalGasto(id = null) {
      document.getElementById('modal-gasto-bg').style.display = 'flex';
      if (id) {
        const gasto = gastosComunesData.find(g => g.id === id);
        if (!gasto) return;
        document.getElementById('modal-gasto-titulo').innerText = 'Editar Gasto Común';
        document.getElementById('gasto-id').value = gasto.id;
        document.getElementById('gasto-residente').value = gasto.nombre;
        document.getElementById('gasto-rut').value = gasto.rut;
        document.getElementById('gasto-parcela').value = gasto.parcela;
        document.getElementById('gasto-fecha').value = gasto.fecha;
        document.getElementById('gasto-monto').value = gasto.monto;
        document.getElementById('gasto-interes').value = gasto.interes;
        document.getElementById('gasto-multa').value = gasto.multa;
        document.getElementById('gasto-total').value = gasto.total;
      } else {
        document.getElementById('modal-gasto-titulo').innerText = 'Agregar Gasto Común';
        document.getElementById('form-gasto').reset();
        document.getElementById('gasto-id').value = '';
        document.getElementById('gasto-total').value = '';
      }
    }

    // Cerrar modal gastos comunes
    function cerrarModalGasto() {
      document.getElementById('modal-gasto-bg').style.display = 'none';
    }

    // Calcular total a pagar con interés y multa
    function calcularTotal() {
      const monto = Number(document.getElementById('gasto-monto').value) || 0;
      const interes = Number(document.getElementById('gasto-interes').value) || 0;
      const multa = Number(document.getElementById('gasto-multa').value) || 0;
      const total = monto + (monto * interes / 100) + (monto * multa / 100);
      document.getElementById('gasto-total').value = total.toFixed(0);
    }

    document.getElementById('gasto-monto').addEventListener('input', calcularTotal);
    document.getElementById('gasto-interes').addEventListener('input', calcularTotal);
    document.getElementById('gasto-multa').addEventListener('input', calcularTotal);

    // Guardar gasto común
    async function guardarGasto(event) {
      event.preventDefault();
      const id = document.getElementById('gasto-id').value || Date.now().toString();
      const nombre = document.getElementById('gasto-residente').value.trim();
      const rut = document.getElementById('gasto-rut').value.trim();
      const parcela = document.getElementById('gasto-parcela').value.trim();
      const fecha = document.getElementById('gasto-fecha').value;
      const monto = Number(document.getElementById('gasto-monto').value);
      const interes = Number(document.getElementById('gasto-interes').value);
      const multa = Number(document.getElementById('gasto-multa').value);
      const total = Number(document.getElementById('gasto-total').value);

      if (!nombre || !rut || !parcela || !fecha || monto <= 0) {
        alert('Por favor, complete todos los campos correctamente.');
        return;
      }

      const fila = [id, nombre, rut, parcela, fecha, '', monto, interes, multa, total];

      try {
        if (document.getElementById('gasto-id').value) {
          const idx = gastosComunesData.findIndex(g => g.id === id);
          if (idx === -1) throw new Error('Gasto no encontrado para editar.');
          await gapi.client.sheets.spreadsheets.values.update({
            spreadsheetId: SPREADSHEET_ID,
            range: `Pagos_GC!A${idx + 2}:J${idx + 2}`,
            valueInputOption: 'RAW',
            values: [fila],
          });
        } else {
          await gapi.client.sheets.spreadsheets.values.append({
            spreadsheetId: SPREADSHEET_ID,
            range: 'Pagos_GC!A2:J',
            valueInputOption: 'RAW',
            insertDataOption: 'INSERT_ROWS',
            values: [fila],
          });
        }
        cerrarModalGasto();
        cargarGastosComunes();
      } catch (error) {
        alert('Error al guardar el gasto común: ' + error.message);
      }
    }

    // Eliminar gasto común
    async function eliminarGasto(id) {
      if (!confirm('¿Está seguro de que desea eliminar este gasto común?')) return;
      try {
        const spreadsheet = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: SPREADSHEET_ID });
        const sheet = spreadsheet.result.sheets.find(s => s.properties.title === 'Pagos_GC');
        const sheetId = sheet ? sheet.properties.sheetId : 0;
        const idx = gastosComunesData.findIndex(g => g.id === id);
        if (idx === -1) throw new Error('Gasto común no encontrado.');
        await gapi.client.sheets.spreadsheets.batchUpdate({
          spreadsheetId: SPREADSHEET_ID,
          requests: [
            {
              deleteDimension: {
                range: {
                  sheetId: sheetId,
                  dimension: 'ROWS',
                  startIndex: idx + 1,
                  endIndex: idx + 2,
                },
              },
            },
          ],
        });
        cargarGastosComunes();
      } catch (error) {
        alert('Error al eliminar el gasto común: ' + error.message);
      }
    }

    // --- (Aquí van las funciones previas: initializeGapiClient, handleCredentialResponse, parseJwt, cargarDashboard, cargarResidentes, etc.) ---

    window.onload = function () {
      initializeGapiClient();
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true,
      });
      google.accounts.id.renderButton(document.getElementById('g_id_signin'), {
        theme: 'outline',
        size: 'large',
        type: 'standard',
        text: 'signin_with',
        shape: 'rectangular',
        logo_alignment: 'left',
      });
    };
  </script>
