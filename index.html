<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración Condominio Los Molles</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="loader-wrapper">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>

    <div id="login-container" style="display: none;">
        <div class="login-box">
            <h1>CondominioLosMolles</h1>
            <p>Por favor, inicie sesión con su cuenta de Google para continuar.</p>
            <button id="login-button">Iniciar Sesión con Google</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3>Condominio<br>Los Molles</h3>
            </div>
            <ul>
                <li><a href="#" class="nav-link active" data-view="dashboard">Dashboard</a></li>
                <li><a href="#" class="nav-link" data-view="residentes">Residentes</a></li>
                <li><a href="#" class="nav-link" data-view="gastos-comunes">Gastos Comunes</a></li>
                <li><a href="#" class="nav-link" data-view="contabilidad">Contabilidad</a></li>
                <li><a href="#" class="nav-link" data-view="comunicaciones">Comunicaciones</a></li>
                <li><a href="#" class="nav-link" data-view="mantenciones">Mantenciones</a></li>
                <li><a href="#" class="nav-link" data-view="multas">Multas</a></li>
                <li><a href="#" class="nav-link" data-view="asambleas">Asambleas</a></li>
                <li><a href="#" class="nav-link" data-view="informes">Informes</a></li>
                <li><a href="#" id="logout-button">Cerrar Sesión</a></li>
            </ul>
        </nav>

        <main id="main-content">
            </main>
    </div>

    <div id="modal-container" class="modal-container" style="display: none;">
        <div class="modal-content">
            <span class="close-modal-button">&times;</span>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="script.js"></script>
</body>
</html>
