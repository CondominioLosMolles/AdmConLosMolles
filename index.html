<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CondominioLosMolles - Administración</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div id="login-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f4f8fb;">
    <div style="background:#fff;padding:48px 36px;border-radius:16px;box-shadow:0 4px 32px #4e91f950;min-width:320px;max-width:90vw;">
      <h2 style="text-align:center;color:#4e91f9;margin-bottom:24px;">Bienvenido a<br>Condominio Los Molles</h2>
      <p style="text-align:center;margin-bottom:32px;color:#2a7de9;">Por favor, inicia sesión con tu cuenta de Google para continuar.</p>
      <button id="authorize_button" style="display:none;width:100%;padding:14px;background:#4e91f9;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Iniciar Sesión</button>
      <button id="signout_button" style="display:none;width:100%;padding:14px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px;">Cerrar Sesión</button>
    </div>
  </div>

  <div id="app" style="display: none;">
    <aside id="sidebar">
      <div class="sidebar-header">
        <img src="img/logo.png" alt="Logo" class="logo">
        <h1>Condominio<br>Los Molles</h1>
      </div>
      <ul class="nav-menu">
        <li class="nav-item active" data-module="dashboard"><a href="#"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
        <li class="nav-item" data-module="gastos_comunes"><a href="#"><i class="fas fa-file-invoice-dollar"></i><span>Gastos Comunes</span></a></li>
        <li class="nav-item" data-module="convenios"><a href="#"><i class="fas fa-handshake"></i><span>Convenios</span></a></li>
        <li class="nav-item" data-module="residentes"><a href="#"><i class="fas fa-users"></i><span>Residentes</span></a></li>
        <li class="nav-item" data-module="egresos"><a href="#"><i class="fas fa-arrow-circle-down"></i><span>Egresos</span></a></li>
        <li class="nav-item" data-module="ingresos"><a href="#"><i class="fas fa-arrow-circle-up"></i><span>Ingresos</span></a></li>
        <li class="nav-item" data-module="proveedores"><a href="#"><i class="fas fa-truck"></i><span>Proveedores</span></a></li>
        <li class="nav-item" data-module="comunicaciones"><a href="#"><i class="fas fa-bullhorn"></i><span>Comunicaciones</span></a></li>
        <li class="nav-item" data-module="configuracion"><a href="#"><i class="fas fa-cogs"></i><span>Configuración</span></a></li>
      </ul>
    </aside>

    <main id="main-content-wrapper">
      <div id="main-content">
        </div>
    </main>

    <div id="spinner" class="spinner-container" style="display: none;">
      <div class="spinner"></div>
    </div>

    <div id="global-modal-container" class="modal-custom">
      <div id="global-modal-content" class="modal-content-custom">
        <div class="modal-header-custom">
          <h5 id="global-modal-title" class="modal-title-custom"></h5>
          <button type="button" class="btn-close-custom" id="global-modal-close">&times;</button>
        </div>
        <div id="global-modal-body" class="modal-body-custom">
          </div>
        <div class="modal-footer-custom">
          <button id="global-modal-save" class="btn btn-success">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
  <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/gastos_comunes.js"></script>
  <script src="js/convenios.js"></script>
  <script src="js/residentes.js"></script>
  <script src="js/egresos.js"></script>
  <script src="js/ingresos.js"></script>
  <script src="js/proveedores.js"></script>
  <script src="js/comunicaciones.js"></script>
  <script src="js/configuracion.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const menuItems = document.querySelectorAll('.nav-item');

      function activaMenu(modulo) {
        menuItems.forEach(i => {
          i.classList.toggle('active', i.getAttribute('data-module') === modulo);
        });
      }

      menuItems.forEach(item => {
        item.addEventListener('click', () => {
          const modulo = item.getAttribute('data-module');
          const funcName = `cargar${modulo.charAt(0).toUpperCase() + modulo.slice(1).replace(/_([a-z])/g, g => g[1].toUpperCase())}`;
          if (typeof window[funcName] === 'function') {
            activaMenu(modulo);
            window[funcName]();
          } else {
            console.error(`La función ${funcName} no está definida.`);
            mostrarMensaje(`Error al cargar ${modulo}: la función ${funcName} no está definida.`, 'error');
          }
        });
      });
      window.activaMenu = activaMenu;

      if (window.authReadyPromise) {
        window.authReadyPromise.then(() => {
          console.log("Señal de autenticación recibida. El sistema está listo para cargar el dashboard.");
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app').style.display = 'flex';
          if (typeof cargarDashboard === 'function') {
            cargarDashboard();
          } else {
            console.error("La función cargarDashboard no está definida.");
            mostrarMensaje("Error: la función cargarDashboard no está definida.", 'error');
          }
        });
      }
    });
  </script>
</body>
</html>
