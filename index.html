<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración Condominio Los Molles</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            display: flex; /* Permite que el sidebar y el contenido estén uno al lado del otro */
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa; /* Fondo ligero */
        }
        #sidebar {
            width: 250px;
            min-width: 250px;
            background-color: #343a40; /* Color oscuro para el sidebar */
            color: #ffffff;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            position: sticky; /* Fija el sidebar */
            top: 0;
            left: 0;
            height: 100vh; /* Ocupa toda la altura de la vista */
            overflow-y: auto; /* Para scroll si hay muchos ítems */
        }
        #sidebar .list-group-item {
            background-color: transparent;
            color: #adb5bd;
            border: none;
            padding: 10px 15px;
            font-size: 1.05em;
            transition: all 0.3s ease;
        }
        #sidebar .list-group-item:hover,
        #sidebar .list-group-item.active {
            color: #ffffff;
            background-color: #007bff; /* Color de realce al pasar el mouse o activo */
            border-radius: 5px;
        }
        #sidebar .list-group-item.active {
            font-weight: bold;
        }
        #sidebar h1 {
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
        }
        #main-content {
            flex-grow: 1; /* Ocupa el espacio restante */
            padding: 20px;
            background-color: #ffffff; /* Fondo blanco para el contenido principal */
            box-shadow: -2px 0 5px rgba(0,0,0,0.05);
            border-left: 1px solid #dee2e6; /* Separador visual */
        }
        .card {
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #f0f2f5; /* Fondo más claro para los headers de las tarjetas */
            color: #343a40;
            border-bottom: 1px solid #dee2e6;
        }
        /* Estilos para spinners */
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        .spinner-text {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="spinner-container" class="spinner-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <div class="spinner-text text-primary">Cargando...</div>
    </div>

    <div id="sidebar">
        <h1>Condominio Los Molles</h1>
        <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action" data-module="dashboard">Dashboard</a>
            <a href="#" class="list-group-item list-group-item-action" data-module="residentes">Residentes</a>
            <a href="#" class="list-group-item list-group-item-action" data-module="proveedores">Proveedores</a>
            <a href="#" class="list-group-item list-group-item-action" data-module="gastos_comunes">Gastos Comunes</a>
            <a href="#" class="list-group-item list-group-item-action" data-module="contabilidad">Contabilidad</a>
            <a href="#" class="list-group-item list-group-item-action" data-module="comunicaciones">Comunicaciones</a>
            <a href="#" class="list-group-item list-group-item-action" data-module="convenios">Convenios</a>
            <a href="#" class="list-group-item list-group-item-action" data-module="gestor_tareas">Gestor de Tareas</a>
        </div>
    </div>

    <div id="main-content" class="flex-grow-1 p-4">
        <h2>Bienvenido</h2>
        <p>Seleccione una opción del menú lateral.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
    
    <script src="js/utils.js"></script>    <script src="js/sheets.js"></script>    <script src="js/auth.js"></script>      <script src="js/gastos_comunes.js"></script> <script src="js/convenios.js"></script> <script src="js/main.js"></script>      <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="messageModalTitle">Mensaje</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="messageModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
