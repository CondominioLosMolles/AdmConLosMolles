<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Condominio Los Molles</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <h2>Los Molles</h2>
      <nav>
        <ul>
          <li data-section="dashboard">Dashboard</li>
          <li data-section="residentes">Residentes</li>
          <li data-section="gastos">Gastos Comunes</li>
          <li data-section="contabilidad">Contabilidad</li>
          <li data-section="comunicaciones">Comunicaciones</li>
          <li data-section="mantenciones">Mantenciones</li>
          <li data-section="multas">Multas</li>
          <li data-section="asambleas">Asambleas</li>
          <li data-section="informes">Informes</li>
          <li data-section="configuracion">Configuración</li>
        </ul>
      </nav>
      <button id="logoutBtn">Cerrar Sesión</button>
    </aside>

    <main class="main-content">
      <section id="dashboard" class="view">Bienvenido al Panel de Administración</section>
      <section id="configuracion" class="view hidden">
        <h2>Configuración</h2>
        <label>TMC (%):
          <input type="number" id="tmcInput" min="0" step="0.01">
        </label>
        <button onclick="guardarConfiguracion()">Guardar</button>
      </section>
    </main>
  </div>

  <div id="login-container">
    <button id="loginBtn">Iniciar sesión con Google</button>
  </div>

  <script src="https://apis.google.com/js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
