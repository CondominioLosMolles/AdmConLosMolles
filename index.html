<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Condominio Los Molles - Administración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    /* Aquí va tu CSS global y específico (igual que antes) */
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Poppins', Arial, sans-serif;
      background: #f3f4f6;
      color: #222;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-width: 320px;
    }
    /* ... resto de estilos ... */
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-section">
    <div id="login-card">
      <h2>Condominio Los Molles</h2>
      <p>Inicia sesión con tu cuenta de Google para administrar el sistema.</p>
      <div id="g_id_signin"></div>
      <div class="loading" id="login-loading" style="display:none;">Conectando con Google...</div>
      <div class="error-message" id="login-error" style="display:none;"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-section" style="display:none;">
    <div class="sidebar">
      <h2>Los Molles</h2>
      <nav>
        <a href="#" data-module="dashboard" class="nav-link active">Dashboard</a>
        <a href="#" data-module="residentes" class="nav-link">Residentes</a>
        <a href="#" data-module="gastos-comunes" class="nav-link">Gastos Comunes</a>
      </nav>
    </div>
    <div class="main-content" id="main-content">
      <!-- Contenido cargado dinámicamente -->
    </div>
  </div>

  <script>
    const CLIENT_ID = '997872453031-5o8s2o6v3qt722fb3p51a2r7bo24ncee.apps.googleusercontent.com';
    const API_KEY = 'AIzaSyA4nUkMycf_CHZE7TaBBD_WUyWMvSXUwoU';
    const SPREADSHEET_ID = '1bFo5dBC3HM0xupginTBe-hrrUNgkiuUn4fkXXzHide8';
    const SCOPES =
      'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/gmail.send';

    let tokenClient;
    let accessToken = null;
    let currentUserEmail = '';

    const appSection = document.getElementById('app-section');
    const loginSection = document.getElementById('login-section');
    const mainContent = document.getElementById('main-content');
    const navLinks = document.querySelectorAll('.nav-link');

    function parseJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(
        atob(base64)
          .split('')
          .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
          .join('')
      );
      return JSON.parse(jsonPayload);
    }

    window.handleCredentialResponse = function(response) {
      document.getElementById('login-loading').style.display = 'block';
      document.getElementById('login-error').style.display = 'none';
      try {
        const payload = parseJwt(response.credential);
        currentUserEmail = payload.email;
        if (currentUserEmail !== 'losmollestunquen@gmail.com') {
          document.getElementById('login-error').textContent = 'Solo el administrador autorizado puede ingresar.';
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
          return;
        }
        if (tokenClient) {
          tokenClient.requestAccessToken();
        } else {
          document.getElementById('login-error').textContent = 'Error: Cliente de token no inicializado.';
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-loading').style.display = 'none';
        }
      } catch (error) {
        document.getElementById('login-error').textContent = 'Error al procesar credenciales: ' + error.message;
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('login-loading').style.display = 'none';
      }
    };

    async function initializeGapiClient() {
      return new Promise((resolve, reject) => {
        gapi.load('client', async () => {
          try {
            await gapi.client.init({
              apiKey: API_KEY,
              discoveryDocs: [
                'https://sheets.googleapis.com/$discovery/rest?version=v4',
                'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest',
                'https://gmail.googleapis.com/$discovery/rest?version=v1',
              ],
            });
            tokenClient = google.accounts.oauth2.initTokenClient({
              client_id: CLIENT_ID,
              scope: SCOPES,
              callback: (tokenResponse) => {
                if (tokenResponse && tokenResponse.access_token) {
                  accessToken = tokenResponse.access_token;
                  gapi.client.setToken({ access_token: accessToken });
                  loginSection.style.display = 'none';
                  appSection.style.display = 'flex';
                  setActiveNav('dashboard');
                  loadModule('dashboard');
                }
              },
            });
            resolve();
          } catch (error) {
            document.getElementById('login-error').textContent =
              'Error al inicializar la API de Google: ' + error.message;
            document.getElementById('login-error').style.display = 'block';
            document.getElementById('login-loading').style.display = 'none';
            reject(error);
          }
        });
      });
    }

    async function loadModule(moduleName) {
      try {
        const html = await fetch(`modulos/${moduleName}/${moduleName}.html`).then(res => res.text());
        mainContent.innerHTML = html;
        const module = await import(`./modulos/${moduleName}/${moduleName}.js`);

        // Exponer funciones globales necesarias para eventos inline
        if (module.abrirModalResidente) window.abrirModalResidente = module.abrirModalResidente;
        if (module.cerrarModalResidente) window.cerrarModalResidente = module.cerrarModalResidente;
        if (module.guardarResidente) window.guardarResidente = module.guardarResidente;
        if (module.eliminarResidente) window.eliminarResidente = module.eliminarResidente;

        if (module.filtrarResidentes) window.filtrarResidentes = module.filtrarResidentes;

        if (module.abrirModalGasto) window.abrirModalGasto = module.abrirModalGasto;
        if (module.cerrarModalGasto) window.cerrarModalGasto = module.cerrarModalGasto;
        if (module.guardarGasto) window.guardarGasto = module.guardarGasto;
        if (module.eliminarGasto) window.eliminarGasto = module.eliminarGasto;
        if (module.filtrarGastosComunes) window.filtrarGastosComunes = module.filtrarGastosComunes;

        if (module.cargarDashboard) module.cargarDashboard();
        if (module.cargarResidentes) module.cargarResidentes();
        if (module.cargarGastosComunes) module.cargarGastosComunes();

        // Cargar CSS dinámicamente
        const existingLink = document.getElementById('module-css');
        if (existingLink) existingLink.remove();
        const link = document.createElement('link');
        link.id = 'module-css';
        link.rel = 'stylesheet';
        link.href = `modulos/${moduleName}/${moduleName}.css`;
        document.head.appendChild(link);
      } catch (error) {
        mainContent.innerHTML = `<p>Error al cargar el módulo ${moduleName}: ${error.message}</p>`;
      }
    }

    function setActiveNav(moduleName) {
      navLinks.forEach(link => {
        if (link.dataset.module === moduleName) link.classList.add('active');
        else link.classList.remove('active');
      });
    }

    navLinks.forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const moduleName = link.dataset.module;
        setActiveNav(moduleName);
        loadModule(moduleName);
      });
    });

    window.onload = async () => {
      await initializeGapiClient();
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: window.handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true,
      });
      google.accounts.id.renderButton(document.getElementById('g_id_signin'), {
        theme: 'outline',
        size: 'large',
        type: 'standard',
        text: 'signin_with',
        shape: 'rectangular',
        logo_alignment: 'left',
      });
    };
  </script>
</body>
</html>
