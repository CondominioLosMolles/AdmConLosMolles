<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CondominioLosMolles - Administración</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="logo">
        <span>Condominio</span><br>
        <span>Los Molles</span>
      </div>
      <nav>
        <ul>
          <li data-module="dashboard" class="active">Dashboard</li>
          <li data-module="residentes">Residentes</li>
          <li data-module="gastos_comunes">Gastos Comunes</li>
          <li data-module="contabilidad">Contabilidad</li>
          <li data-module="comunicaciones">Comunicaciones</li>
          <li data-module="mantenciones">Mantenciones</li>
          <li data-module="multas">Multas</li>
          <li data-module="asambleas">Asambleas</li>
          <li data-module="informes">Informes</li>
        </ul>
      </nav>
      <button id="logoutBtn">Cerrar sesión</button>
    </aside>
    <main id="main-content">
      <!-- El contenido de los módulos se carga aquí dinámicamente -->
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/gmail.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/residentes.js"></script>
  <script src="js/gastos_comunes.js"></script>
  <script src="js/contabilidad.js"></script>
  <script src="js/comunicaciones.js"></script>
  <script src="js/mantenciones.js"></script>
  <script src="js/multas.js"></script>
  <script src="js/asambleas.js"></script>
  <script src="js/informes.js"></script>
  <script>
    // --- Navegación activa robusta ---
    document.addEventListener('DOMContentLoaded', function() {
      const menuItems = document.querySelectorAll('#sidebar nav ul li[data-module]');

      function activaMenu(modulo) {
        menuItems.forEach(i => {
          if (i.getAttribute('data-module') === modulo) {
            i.classList.add('active');
          } else {
            i.classList.remove('active');
          }
        });
      }

      // Listeners para cada módulo principal
      document.querySelector('[data-module="dashboard"]').addEventListener('click', () => {
        activaMenu('dashboard');
        cargarDashboard();
      });
      document.querySelector('[data-module="residentes"]').addEventListener('click', () => {
        activaMenu('residentes');
        cargarResidentes();
      });
      document.querySelector('[data-module="gastos_comunes"]').addEventListener('click', () => {
        activaMenu('gastos_comunes');
        cargarGastosComunes();
      });
      document.querySelector('[data-module="contabilidad"]').addEventListener('click', () => {
        activaMenu('contabilidad');
        cargarContabilidad();
      });
      document.querySelector('[data-module="comunicaciones"]').addEventListener('click', () => {
        activaMenu('comunicaciones');
        cargarComunicaciones();
      });
      document.querySelector('[data-module="mantenciones"]').addEventListener('click', () => {
        activaMenu('mantenciones');
        cargarMantenciones();
      });
      document.querySelector('[data-module="multas"]').addEventListener('click', () => {
        activaMenu('multas');
        cargarMultas();
      });
      document.querySelector('[data-module="asambleas"]').addEventListener('click', () => {
        activaMenu('asambleas');
        cargarAsambleas();
      });
      document.querySelector('[data-module="informes"]').addEventListener('click', () => {
        activaMenu('informes');
        cargarInformes();
      });

      // Si navegas por código, puedes usar: activaMenu('nombre_modulo');
      window.activaMenu = activaMenu;
    });
  </script>
</body>
</html>
