<div class="section-title">Gastos Comunes</div>

<div class="residente-actions" style="margin-bottom: 24px;">
  <input
    type="text"
    id="busqueda-gastos"
    placeholder="Buscar por nombre, RUT o parcela..."
    oninput="filtrarGastosComunes()"
    aria-label="Buscar gastos comunes"
    style="width: 320px;"
  />
  <button class="btn" onclick="abrirModalGasto()">Agregar Gasto Común</button>
</div>

<table class="residente-table" id="tabla-gastos" aria-label="Tabla de gastos comunes">
  <thead>
    <tr>
      <th>Nombre Residente</th>
      <th>RUT</th>
      <th>N° Parcela</th>
      <th>Fecha Pago</th>
      <th>Monto</th>
      <th>Interés (%)</th>
      <th>Multa (%)</th>
      <th>Total a Pagar</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tbody-gastos"></tbody>
</table>

<!-- Modal Agregar/Editar Gasto Común -->
<div id="modal-gasto-bg" class="modal-bg" style="display:none;">
  <div class="modal">
    <button class="close-modal" onclick="cerrarModalGasto()" aria-label="Cerrar">&times;</button>
    <h3 id="modal-gasto-titulo">Agregar Gasto Común</h3>
    <form id="form-gasto" onsubmit="guardarGasto(event)">
      <input type="hidden" id="gasto-id" />
      <label for="gasto-residente">Nombre Residente</label>
      <input type="text" id="gasto-residente" required />
      <label for="gasto-rut">RUT</label>
      <input type="text" id="gasto-rut" required />
      <label for="gasto-parcela">N° Parcela</label>
      <input type="number" id="gasto-parcela" required />
      <label for="gasto-fecha">Fecha Pago</label>
      <input type="date" id="gasto-fecha" required />
      <label for="gasto-monto">Monto</label>
      <input type="number" id="gasto-monto" min="0" required />
      <label for="gasto-interes">Interés (%)</label>
      <input type="number" id="gasto-interes" min="0" step="0.01" value="0" required />
      <label for="gasto-multa">Multa (%)</label>
      <input type="number" id="gasto-multa" min="0" step="0.01" value="0" required />
      <label for="gasto-total">Total a Pagar</label>
      <input type="number" id="gasto-total" readonly />
      <button class="btn" type="submit">Guardar</button>
    </form>
  </div>
</div>
