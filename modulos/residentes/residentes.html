<div class="section-title">Residentes</div>
<div class="residente-actions">
  <input
    type="text"
    id="busqueda-residente"
    placeholder="Buscar por nombre, RUT o parcela..."
    oninput="filtrarResidentes()"
    aria-label="Buscar residentes"
  />
  <button class="btn" onclick="abrirModalResidente()">Agregar Residente</button>
</div>
<table class="residente-table" id="tabla-residentes" aria-label="Tabla de residentes">
  <thead>
    <tr>
      <th style="width: 22%;">Nombre Completo</th>
      <th style="width: 14%;">RUT</th>
      <th style="width: 8%;">N° Parcela</th>
      <th style="width: 18%;">Dirección</th>
      <th style="width: 15%;">Email</th>
      <th style="width: 12%;">Teléfono</th>
      <th style="width: 13%;">Estado</th>
      <th style="width: 10%;">Gasto Común</th>
      <th style="width: 10%;">Acciones</th>
    </tr>
  </thead>
  <tbody id="tbody-residentes"></tbody>
</table>

<!-- Modal Agregar/Editar Residente -->
<div id="modal-residente-bg" class="modal-bg" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
  <div class="modal">
    <button class="close-modal" onclick="cerrarModalResidente()" aria-label="Cerrar">&times;</button>
    <h3 id="modal-titulo">Agregar Residente</h3>
    <form id="form-residente" onsubmit="guardarResidente(event)">
      <input type="hidden" id="residente-id" />
      <label for="res-nombre">Nombre Completo</label>
      <input type="text" id="res-nombre" required />
      <label for="res-rut">RUT</label>
      <input type="text" id="res-rut" required />
      <label for="res-parcela">N° Parcela</label>
      <input type="number" id="res-parcela" required />
      <label for="res-direccion">Dirección</label>
      <input type="text" id="res-direccion" required />
      <label for="res-email">Email</label>
      <input type="email" id="res-email" required />
      <label for="res-telefono">Teléfono</label>
      <input type="text" id="res-telefono" required />
      <label for="res-estado">Estado</label>
      <select id="res-estado" required>
        <option value="Activo">Activo</option>
        <option value="Moroso">Moroso</option>
        <option value="Inactivo">Inactivo</option>
      </select>
      <label for="res-gasto">Gasto Común</label>
      <input type="number" id="res-gasto" required />
      <button class="btn" type="submit">Guardar</button>
    </form>
  </div>
</div>
